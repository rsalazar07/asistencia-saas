services:
  - type: web
    name: asistencia-backend
    env: node
    buildCommand: cd apps/backend && npm install && npx prisma generate --schema=../../packages/database/prisma/schema.prisma && npm run build
    startCommand: cd apps/backend && npm run start:prod
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: asistencia-db
          property: connectionString
